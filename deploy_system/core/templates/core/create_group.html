<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建分组 - 集群版本发布系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
        }
        .header .user-info {
            display: flex;
            align-items: center;
        }
        .header .user-info span {
            margin-right: 15px;
        }
        .header .user-info a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #4CAF50;
            border-radius: 4px;
        }
        .nav {
            background-color: #4CAF50;
            padding: 10px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .btn-submit {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-submit:hover {
            background-color: #45a049;
        }
        .error-message {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>集群版本发布系统</h1>
        <div class="user-info">
            <span>欢迎，{{ user.username }}</span>
            <a href="{% url 'logout' %}">退出登录</a>
        </div>
    </div>
    <div class="nav">
        <a href="{% url 'index' %}">首页</a>
        <a href="{% url 'nodes' %}">节点管理</a>
        <a href="{% url 'groups' %}">分组管理</a>
        <a href="{% url 'tasks' %}">发布任务</a>
    </div>
    <div class="content">
        <div class="card">
            <h2>创建分组</h2>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name">分组名称</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="description">描述</label>
                    <textarea id="description" name="description"></textarea>
                </div>
                {% if error_message %}
                <div class="error-message">{{ error_message }}</div>
                {% endif %}
                <button type="submit" class="btn-submit">创建</button>
            </form>
        </div>
    </div>
</body>
</html>
