<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集群版本发布系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
        }
        .header .user-info {
            display: flex;
            align-items: center;
        }
        .header .user-info span {
            margin-right: 15px;
        }
        .header .user-info a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #4CAF50;
            border-radius: 4px;
        }
        .nav {
            background-color: #4CAF50;
            padding: 10px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>集群版本发布系统</h1>
        <div class="user-info">
            <span>欢迎，{{ user.username }}</span>
            <a href="{% url 'logout' %}">退出登录</a>
        </div>
    </div>
    <div class="nav">
        <a href="{% url 'index' %}">首页</a>
        <a href="{% url 'nodes' %}">节点管理</a>
        <a href="{% url 'groups' %}">分组管理</a>
        <a href="{% url 'tasks' %}">发布任务</a>
    </div>
    <div class="content">
        <h2>系统概览</h2>
        <div class="dashboard">
            <div class="card">
                <h2>节点状态</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">{{ total_nodes }}</div>
                        <div class="stat-label">总节点数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">{{ active_nodes }}</div>
                        <div class="stat-label">活跃节点</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">{{ inactive_nodes }}</div>
                        <div class="stat-label">非活跃节点</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>发布任务</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">{{ total_tasks }}</div>
                        <div class="stat-label">总任务数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">{{ running_tasks }}</div>
                        <div class="stat-label">运行中任务</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">{{ completed_tasks }}</div>
                        <div class="stat-label">已完成任务</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>分组管理</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">{{ total_groups }}</div>
                        <div class="stat-label">总分组数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">{{ avg_nodes_per_group }}</div>
                        <div class="stat-label">平均节点数/分组</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
