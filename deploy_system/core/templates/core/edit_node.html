<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑节点 - 集群版本发布系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
        }
        .header .user-info {
            display: flex;
            align-items: center;
        }
        .header .user-info span {
            margin-right: 15px;
        }
        .header .user-info a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #4CAF50;
            border-radius: 4px;
        }
        .nav {
            background-color: #4CAF50;
            padding: 10px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-submit {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-submit:hover {
            background-color: #45a049;
        }
        .error-message {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>集群版本发布系统</h1>
        <div class="user-info">
            <span>欢迎，{{ user.username }}</span>
            <a href="{% url 'logout' %}">退出登录</a>
        </div>
    </div>
    <div class="nav">
        <a href="{% url 'index' %}">首页</a>
        <a href="{% url 'nodes' %}">节点管理</a>
        <a href="{% url 'groups' %}">分组管理</a>
        <a href="{% url 'tasks' %}">发布任务</a>
    </div>
    <div class="content">
        <div class="card">
            <h2>编辑节点</h2>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="node_id">节点ID</label>
                    <input type="text" id="node_id" value="{{ node.node_id }}" disabled>
                </div>
                <div class="form-group">
                    <label for="hostname">主机名</label>
                    <input type="text" id="hostname" value="{{ node.hostname }}" disabled>
                </div>
                <div class="form-group">
                    <label for="ip_address">IP地址</label>
                    <input type="text" id="ip_address" value="{{ node.ip_address }}" disabled>
                </div>
                <div class="form-group">
                    <label for="group">所属分组</label>
                    <select id="group" name="group">
                        <option value="">未分组</option>
                        {% for group in groups %}
                        <option value="{{ group.id }}" {% if node.group and node.group.id == group.id %}selected{% endif %}>{{ group.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="current_version">当前版本</label>
                    <input type="text" id="current_version" value="{{ node.current_version }}" disabled>
                </div>
                <div class="form-group">
                    <label for="status">状态</label>
                    <input type="text" id="status" value="{% if node.is_active %}活跃{% else %}非活跃{% endif %}" disabled>
                </div>
                <button type="submit" class="btn-submit">保存</button>
            </form>
        </div>
    </div>
</body>
</html>
