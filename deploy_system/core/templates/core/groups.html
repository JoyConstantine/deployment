<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分组管理 - 集群版本发布系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
        }
        .header .user-info {
            display: flex;
            align-items: center;
        }
        .header .user-info span {
            margin-right: 15px;
        }
        .header .user-info a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #4CAF50;
            border-radius: 4px;
        }
        .nav {
            background-color: #4CAF50;
            padding: 10px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-add {
            background-color: #4CAF50;
            color: white;
            margin-bottom: 20px;
        }
        .btn-edit {
            background-color: #2196F3;
            color: white;
        }
        .btn-delete {
            background-color: #f44336;
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>集群版本发布系统</h1>
        <div class="user-info">
            <span>欢迎，{{ user.username }}</span>
            <a href="{% url 'logout' %}">退出登录</a>
        </div>
    </div>
    <div class="nav">
        <a href="{% url 'index' %}">首页</a>
        <a href="{% url 'nodes' %}">节点管理</a>
        <a href="{% url 'groups' %}">分组管理</a>
        <a href="{% url 'tasks' %}">发布任务</a>
    </div>
    <div class="content">
        <div class="card">
            <h2>分组管理</h2>
            <a href="{% url 'create_group' %}" class="action-btn btn-add">添加分组</a>
            <table>
                <thead>
                    <tr>
                        <th>分组名称</th>
                        <th>描述</th>
                        <th>节点数量</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for group in groups %}
                    <tr>
                        <td>{{ group.name }}</td>
                        <td>{{ group.description }}</td>
                        <td>{{ group.nodes.count }}</td>
                        <td>{{ group.created_at|date:"Y-m-d H:i:s" }}</td>
                        <td>
                            <a href="{% url 'edit_group' group.id %}" class="action-btn btn-edit">编辑</a>
                            <a href="{% url 'delete_group' group.id %}" class="action-btn btn-delete">删除</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
